  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Decorative border -->
  <rect x="15" y="15" width="1170" height="370" rx="8" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.3"/>
  <rect x="25" y="25" width="1150" height="350" rx="6" fill="none" stroke="#C084FC" stroke-width="0.5" opacity="0.2"/>
