  <path d="M0,60 Q150,40 300,55 Q450,70 600,50 Q750,30 900,55 Q1050,70 1200,50" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.2"/>
  <path d="M0,340 Q150,360 300,345 Q450,330 600,350 Q750,370 900,345 Q1050,330 1200,350" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.2"/>
