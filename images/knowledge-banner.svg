  <path d="M15,45 L15,15 L45,15" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
  <path d="M1185,45 L1185,15 L1155,15" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
  <path d="M15,355 L15,385 L45,385" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
  <path d="M1185,355 L1185,385 L1155,385" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
