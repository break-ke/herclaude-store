<svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="cinnabar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#paper)" rx="4"/>
  <rect x="15" y="15" width="570" height="720" rx="2" fill="none" stroke="url(#cinnabar)" stroke-width="2"/>
  <rect x="25" y="25" width="550" height="700" rx="2" fill="none" stroke="url(#cinnabar)" stroke-width="1" opacity="0.6"/>
  <path d="M15,45 L15,15 L45,15" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M585,45 L585,15 L555,15" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M15,705 L15,735 L45,735" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M585,705 L585,735 L555,735" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- Love seal -->
  <rect x="200" y="60" width="200" height="200" rx="6" fill="url(#cinnabar)"/>
  <rect x="215" y="75" width="170" height="170" rx="4" fill="none" stroke="#FF80AB" stroke-width="1.5" opacity="0.5"/>
  <text x="300" y="140" font-family="serif" font-size="40" fill="#FFD700" text-anchor="middle">囍</text>
  <text x="300" y="210" font-family="serif" font-size="36" fill="#FFD700" text-anchor="middle" font-weight="bold">姻</text>
  <!-- Double happiness symbol -->
  <text x="300" y="370" font-family="serif" font-size="80" fill="url(#cinnabar)" text-anchor="middle" opacity="0.7">囍</text>
  <circle cx="300" cy="460" r="50" fill="none" stroke="url(#cinnabar)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="460" r="40" fill="none" stroke="url(#cinnabar)" stroke-width="1" opacity="0.3"/>
  <!-- Peach blossom petals -->
  <path d="M250,430 Q240,400 260,420 Q270,400 280,430" fill="url(#cinnabar)" opacity="0.3"/>
  <path d="M320,430 Q310,400 330,420 Q340,400 350,430" fill="url(#cinnabar)" opacity="0.3"/>
  <path d="M285,470 Q275,440 295,460 Q305,440 315,470" fill="url(#cinnabar)" opacity="0.3"/>
  <!-- Content -->
  <text x="300" y="530" font-family="'Playfair Display', serif" font-size="28" fill="#1A1A1A" text-anchor="middle" font-weight="bold" letter-spacing="2">Love Talisman</text>
  <text x="300" y="560" font-family="'Noto Serif SC', serif" font-size="18" fill="#E91E63" text-anchor="middle">姻缘符 · 情定终身</text>
  <text x="300" y="590" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">Attract true love & strengthen relationships</text>
  <rect x="230" y="625" width="140" height="35" rx="17" fill="url(#cinnabar)"/>
  <text x="300" y="648" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle" font-weight="bold">$27.99</text>
