<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Golden yellow paper gradient -->
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#F5DEB3"/>
    </linearGradient>
    <!-- Cinnabar ink gradient -->
    <linearGradient id="cinnabar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Border gold -->
    <linearGradient id="goldBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Aged paper filter -->
    <filter id="aged">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="5" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="600" height="600" fill="url(#paper)" rx="4"/>

  <!-- Aged texture cracks and lines -->
  <path d="M0,0 L12,15 L8,38 L20,52" fill="none" stroke="#C4A96E" stroke-width="0.5" opacity="0.35"/>
  <path d="M588,0 L575,22 L578,45 L565,60" fill="none" stroke="#C4A96E" stroke-width="0.5" opacity="0.35"/>
  <path d="M0,595 L18,580 L14,555 L28,540" fill="none" stroke="#C4A96E" stroke-width="0.5" opacity="0.35"/>
  <path d="M595,595 L580,570 L585,548 L570,530" fill="none" stroke="#C4A96E" stroke-width="0.5" opacity="0.35"/>
  <path d="M200,10 L205,45 L195,60" fill="none" stroke="#C4A96E" stroke-width="0.4" opacity="0.25"/>
  <path d="M400,590 L395,555 L405,540" fill="none" stroke="#C4A96E" stroke-width="0.4" opacity="0.25"/>
  <path d="M50,300 L65,295 L80,305 L95,290" fill="none" stroke="#C4A96E" stroke-width="0.5" opacity="0.2"/>
  <path d="M550,320 L535,315 L520,325 L505,310" fill="none" stroke="#C4A96E" stroke-width="0.5" opacity="0.2"/>
  <path d="M280,0 L282,18 L275,30" fill="none" stroke="#C4A96E" stroke-width="0.4" opacity="0.2"/>
  <path d="M320,598 L318,580 L325,568" fill="none" stroke="#C4A96E" stroke-width="0.4" opacity="0.2"/>

  <!-- Outer gold border -->
  <rect x="10" y="10" width="580" height="580" rx="4" fill="none" stroke="url(#goldBorder)" stroke-width="3"/>

  <!-- Inner cinnabar border -->
  <rect x="18" y="18" width="564" height="564" rx="2" fill="none" stroke="url(#cinnabar)" stroke-width="1.5" opacity="0.55"/>

  <!-- Corner ornaments - cinnabar squares with gold trim -->
  <!-- Top-left -->
  <rect x="18" y="18" width="28" height="28" rx="3" fill="url(#cinnabar)"/>
  <rect x="22" y="22" width="20" height="20" rx="2" fill="none" stroke="#FF6666" stroke-width="0.8" opacity="0.6"/>
  <text x="32" y="38" font-family="serif" font-size="14" fill="#FFD700" text-anchor="middle">▣</text>

  <!-- Top-right -->
  <rect x="554" y="18" width="28" height="28" rx="3" fill="url(#cinnabar)"/>
  <rect x="558" y="22" width="20" height="20" rx="2" fill="none" stroke="#FF6666" stroke-width="0.8" opacity="0.6"/>
  <text x="568" y="38" font-family="serif" font-size="14" fill="#FFD700" text-anchor="middle">▣</text>

  <!-- Bottom-left -->
  <rect x="18" y="554" width="28" height="28" rx="3" fill="url(#cinnabar)"/>
  <rect x="22" y="558" width="20" height="20" rx="2" fill="none" stroke="#FF6666" stroke-width="0.8" opacity="0.6"/>
  <text x="32" y="574" font-family="serif" font-size="14" fill="#FFD700" text-anchor="middle">▣</text>

  <!-- Bottom-right -->
  <rect x="554" y="554" width="28" height="28" rx="3" fill="url(#cinnabar)"/>
  <rect x="558" y="558" width="20" height="20" rx="2" fill="none" stroke="#FF6666" stroke-width="0.8" opacity="0.6"/>
  <text x="568" y="574" font-family="serif" font-size="14" fill="#FFD700" text-anchor="middle">▣</text>

  <!-- Main seal: 宅 (Zhai) character -->
  <rect x="170" y="50" width="260" height="170" rx="8" fill="url(#cinnabar)"/>
  <rect x="185" y="65" width="230" height="140" rx="5" fill="none" stroke="#FF6666" stroke-width="1.5" opacity="0.5"/>
  <text x="300" y="148" font-family="'Noto Serif SC', 'SimSun', 'STSong', serif" font-size="76" fill="url(#gold)" text-anchor="middle" font-weight="bold">宅</text>
  <text x="300" y="200" font-family="serif" font-size="14" fill="#FFD700" text-anchor="middle" opacity="0.8" letter-spacing="4">HOME GUARDIAN</text>

  <!-- Bagua circle -->
  <circle cx="300" cy="350" r="90" fill="none" stroke="url(#cinnabar)" stroke-width="2"/>
  <circle cx="300" cy="350" r="80" fill="none" stroke="url(#cinnabar)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="350" r="55" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- Center Tai Chi symbol -->
  <text x="300" y="365" font-family="serif" font-size="48" fill="url(#cinnabar)" text-anchor="middle" opacity="0.85">☯</text>

  <!-- Bagua trigrams positioned in a circle (Earlier Heaven / 先天八卦) -->
  <!-- Radii: 68 from center (300,350) -->
  <!-- Top: ☰ 乾 Heaven -->
  <text x="300" y="280" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☰</text>
  <!-- Top-right: ☴ 巽 Wind -->
  <text x="348" y="298" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☴</text>
  <!-- Right: ☵ 坎 Water -->
  <text x="370" y="358" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☵</text>
  <!-- Bottom-right: ☶ 艮 Mountain -->
  <text x="348" y="418" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☶</text>
  <!-- Bottom: ☷ 坤 Earth -->
  <text x="300" y="438" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☷</text>
  <!-- Bottom-left: ☳ 震 Thunder -->
  <text x="252" y="418" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☳</text>
  <!-- Left: ☲ 離 Fire -->
  <text x="230" y="358" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☲</text>
  <!-- Top-left: ☱ 兌 Lake -->
  <text x="252" y="298" font-family="serif" font-size="26" fill="url(#cinnabar)" text-anchor="middle">☱</text>

  <!-- Grounding lines at bottom - horizontal stabilizing lines -->
  <line x1="100" y1="475" x2="500" y2="475" stroke="url(#cinnabar)" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="480" x2="480" y2="480" stroke="url(#cinnabar)" stroke-width="0.5" opacity="0.2"/>

  <!-- Small decorative diamond stamps -->
  <polygon points="75,490 85,480 95,490 85,500" fill="url(#cinnabar)"/>
  <polygon points="525,490 535,480 545,490 535,500" fill="url(#cinnabar)"/>

  <!-- Bottom text -->
  <text x="300" y="510" font-family="'Playfair Display', 'Georgia', serif" font-size="22" fill="#1A1A1A" text-anchor="middle" font-weight="bold" letter-spacing="3">Home Guardian</text>
  <text x="300" y="538" font-family="'Noto Serif SC', 'SimSun', serif" font-size="17" fill="url(#cinnabar)" text-anchor="middle" letter-spacing="2">镇宅符 · 家宅平安</text>
  <text x="300" y="565" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle" letter-spacing="1">Stabilize and protect your home</text>

  <!-- Small seal stamp bottom center -->
  <rect x="268" y="570" width="64" height="22" rx="3" fill="url(#cinnabar)" opacity="0.8"/>
  <text x="300" y="585" font-family="serif" font-size="11" fill="#FFD700" text-anchor="middle" letter-spacing="2" opacity="0.9">家安</text>
</svg>
