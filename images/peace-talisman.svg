<svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0EB"/>
      <stop offset="100%" stop-color="#EBE5D9"/>
    </linearGradient>
    <linearGradient id="cinnabar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#0E2F44"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#paper)" rx="4"/>
  <rect x="15" y="15" width="570" height="720" rx="2" fill="none" stroke="url(#cinnabar)" stroke-width="2"/>
  <rect x="25" y="25" width="550" height="700" rx="2" fill="none" stroke="url(#cinnabar)" stroke-width="1" opacity="0.6"/>
  <path d="M15,45 L15,15 L45,15" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M585,45 L585,15 L555,15" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M15,705 L15,735 L45,735" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M585,705 L585,735 L555,735" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- Peace seal -->
  <rect x="200" y="60" width="200" height="200" rx="6" fill="url(#blue)"/>
  <rect x="215" y="75" width="170" height="170" rx="4" fill="none" stroke="#5DADE2" stroke-width="1.5" opacity="0.5"/>
  <text x="300" y="145" font-family="serif" font-size="60" fill="#FFD700" text-anchor="middle" font-weight="bold">安</text>
  <text x="300" y="210" font-family="serif" font-size="36" fill="#FFD700" text-anchor="middle">出入平安</text>
  <!-- Dove / peace symbol -->
  <path d="M300,310 Q280,340 260,350 Q240,360 250,340 Q260,320 300,310" fill="url(#blue)" opacity="0.3"/>
  <path d="M300,310 Q320,340 340,350 Q360,360 350,340 Q340,320 300,310" fill="url(#blue)" opacity="0.3"/>
  <circle cx="300" cy="400" r="45" fill="none" stroke="url(#blue)" stroke-width="2.5" opacity="0.6"/>
  <circle cx="300" cy="400" r="35" fill="none" stroke="url(#blue)" stroke-width="1.5" opacity="0.4"/>
  <text x="300" y="412" font-family="serif" font-size="40" fill="url(#blue)" text-anchor="middle" opacity="0.7">☯</text>
  <!-- Wave pattern -->
  <path d="M150,470 Q200,450 250,470 Q300,490 350,470 Q400,450 450,470" fill="none" stroke="url(#blue)" stroke-width="1.5" opacity="0.4"/>
  <!-- Content -->
  <text x="300" y="530" font-family="'Playfair Display', serif" font-size="28" fill="#1A1A1A" text-anchor="middle" font-weight="bold" letter-spacing="2">Peace Talisman</text>
  <text x="300" y="560" font-family="'Noto Serif SC', serif" font-size="18" fill="#1A5276" text-anchor="middle">平安符 · 诸事顺遂</text>
  <text x="300" y="590" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">Bring harmony, tranquility & spiritual calm</text>
  <rect x="230" y="625" width="140" height="35" rx="17" fill="url(#blue)"/>
  <text x="300" y="648" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle" font-weight="bold">$22.99</text>
</svg>
