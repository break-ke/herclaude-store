<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Paper gradient -->
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF8F0"/>
      <stop offset="100%" stop-color="#F0E8D8"/>
    </linearGradient>
    <!-- Cinnabar accent gradient -->
    <linearGradient id="cinnabar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <!-- Gold ornament gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="50%" stop-color="#C8942A"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Aged paper texture pattern -->
    <pattern id="paperTexture" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="none"/>
      <line x1="0" y1="15" x2="200" y2="18" stroke="#D4C8B0" stroke-width="0.3" opacity="0.3"/>
      <line x1="0" y1="42" x2="200" y2="39" stroke="#D4C8B0" stroke-width="0.2" opacity="0.25"/>
      <line x1="0" y1="78" x2="200" y2="80" stroke="#D4C8B0" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="105" x2="200" y2="103" stroke="#D4C8B0" stroke-width="0.2" opacity="0.3"/>
      <line x1="0" y1="135" x2="200" y2="137" stroke="#D4C8B0" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="168" x2="200" y2="166" stroke="#D4C8B0" stroke-width="0.2" opacity="0.25"/>
      <line x1="0" y1="190" x2="200" y2="192" stroke="#D4C8B0" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background paper -->
  <rect width="600" height="600" fill="url(#paper)" rx="4"/>
  <rect width="600" height="600" fill="url(#paperTexture)" rx="4"/>

  <!-- Cinnabar border - outer -->
  <rect x="14" y="14" width="572" height="572" rx="3" fill="none" stroke="url(#cinnabar)" stroke-width="2"/>
  <!-- Cinnabar border - inner -->
  <rect x="22" y="22" width="556" height="556" rx="2" fill="none" stroke="url(#cinnabar)" stroke-width="1" opacity="0.4"/>

  <!-- Gold corner ornaments - top left -->
  <path d="M30,30 L60,30 L60,36 L36,36 L36,60 L30,60 Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Gold corner ornaments - top right -->
  <path d="M570,30 L540,30 L540,36 L564,36 L564,60 L570,60 Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Gold corner ornaments - bottom left -->
  <path d="M30,570 L60,570 L60,564 L36,564 L36,540 L30,540 Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Gold corner ornaments - bottom right -->
  <path d="M570,570 L540,570 L540,564 L564,564 L564,540 L570,540 Z" fill="url(#gold)" opacity="0.7"/>

  <!-- Decorative top line pattern -->
  <line x1="100" y1="48" x2="500" y2="48" stroke="#1A1A1A" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="52" x2="480" y2="52" stroke="#CC0000" stroke-width="0.5" opacity="0.2"/>

  <!-- Main seal box - cream inner box with cinnabar border -->
  <rect x="120" y="70" width="360" height="170" rx="6" fill="#FBF5E8" stroke="url(#cinnabar)" stroke-width="2"/>
  <rect x="126" y="76" width="348" height="158" rx="4" fill="none" stroke="#CC0000" stroke-width="0.5" opacity="0.3"/>

  <!-- Cinnabar character 職 (Zhi - Profession) -->
  <text x="300" y="190" font-family="'STKaiti','KaiTi','SimSun','Noto Serif SC',serif" font-size="96" fill="url(#cinnabar)" text-anchor="middle" font-weight="bold">職</text>

  <!-- Subtle seal box decorative lines -->
  <line x1="135" y1="222" x2="465" y2="222" stroke="#CC0000" stroke-width="0.5" opacity="0.25"/>

  <!-- Yin-Yang decorative element - top left -->
  <circle cx="145" cy="105" r="12" fill="none" stroke="#1A1A1A" stroke-width="0.8" opacity="0.4"/>
  <circle cx="145" cy="105" r="3" fill="#1A1A1A" opacity="0.4"/>

  <!-- Yin-Yang decorative element - top right -->
  <circle cx="455" cy="105" r="12" fill="none" stroke="#1A1A1A" stroke-width="0.8" opacity="0.4"/>
  <circle cx="455" cy="105" r="3" fill="#1A1A1A" opacity="0.4"/>

  <!-- Yin-Yang decorative element - bottom left seal box -->
  <circle cx="145" cy="215" r="8" fill="none" stroke="#1A1A1A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="145" cy="215" r="2" fill="#CC0000" opacity="0.4"/>

  <!-- Yin-Yang decorative element - bottom right seal box -->
  <circle cx="455" cy="215" r="8" fill="none" stroke="#1A1A1A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="455" cy="215" r="2" fill="#CC0000" opacity="0.4"/>

  <!-- Balanced yin-yang decorative lines - left side -->
  <path d="M60,280 Q80,270 90,290 Q100,310 80,320" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <path d="M60,310 Q75,300 85,315 Q95,330 75,340" fill="none" stroke="#CC0000" stroke-width="0.8" opacity="0.25"/>

  <!-- Balanced yin-yang decorative lines - right side -->
  <path d="M540,280 Q520,270 510,290 Q500,310 520,320" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <path d="M540,310 Q525,300 515,315 Q505,330 525,340" fill="none" stroke="#CC0000" stroke-width="0.8" opacity="0.25"/>

  <!-- Crossed protective strokes - top left quadrant -->
  <line x1="80" y1="280" x2="110" y2="260" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>
  <line x1="80" y1="265" x2="110" y2="285" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>

  <!-- Crossed protective strokes - top right quadrant -->
  <line x1="520" y1="280" x2="490" y2="260" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>
  <line x1="520" y1="265" x2="490" y2="285" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>

  <!-- Crossed protective strokes - bottom left -->
  <line x1="80" y1="380" x2="110" y2="360" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>
  <line x1="80" y1="365" x2="110" y2="385" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>

  <!-- Crossed protective strokes - bottom right -->
  <line x1="520" y1="380" x2="490" y2="360" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>
  <line x1="520" y1="365" x2="490" y2="385" stroke="#1A1A1A" stroke-width="1.5" opacity="0.35"/>

  <!-- Central decorative protective circle -->
  <circle cx="300" cy="310" r="55" fill="none" stroke="#1A1A1A" stroke-width="0.8" opacity="0.25"/>
  <circle cx="300" cy="310" r="45" fill="none" stroke="#CC0000" stroke-width="0.6" opacity="0.2"/>
  <circle cx="300" cy="310" r="35" fill="none" stroke="#1A1A1A" stroke-width="0.5" opacity="0.15"/>

  <!-- Protective crossed strokes at center -->
  <line x1="270" y1="290" x2="330" y2="330" stroke="#CC0000" stroke-width="0.8" opacity="0.2"/>
  <line x1="330" y1="290" x2="270" y2="330" stroke="#CC0000" stroke-width="0.8" opacity="0.2"/>

  <!-- Decorative divider -->
  <line x1="180" y1="395" x2="420" y2="395" stroke="#CC0000" stroke-width="0.8" opacity="0.3"/>

  <!-- Small protective dot patterns - bottom section -->
  <circle cx="140" cy="420" r="2.5" fill="#1A1A1A" opacity="0.3"/>
  <circle cx="150" cy="420" r="2.5" fill="#1A1A1A" opacity="0.3"/>
  <circle cx="160" cy="420" r="2.5" fill="#1A1A1A" opacity="0.3"/>

  <circle cx="440" cy="420" r="2.5" fill="#1A1A1A" opacity="0.3"/>
  <circle cx="450" cy="420" r="2.5" fill="#1A1A1A" opacity="0.3"/>
  <circle cx="460" cy="420" r="2.5" fill="#1A1A1A" opacity="0.3"/>

  <!-- Small stamp seals bottom left and right -->
  <rect x="88" y="428" width="36" height="36" rx="3" fill="none" stroke="url(#cinnabar)" stroke-width="1.2"/>
  <text x="106" y="452" font-family="'STKaiti','KaiTi',serif" font-size="18" fill="url(#cinnabar)" text-anchor="middle">護</text>

  <rect x="476" y="428" width="36" height="36" rx="3" fill="none" stroke="url(#cinnabar)" stroke-width="1.2"/>
  <text x="494" y="452" font-family="'STKaiti','KaiTi',serif" font-size="18" fill="url(#cinnabar)" text-anchor="middle">身</text>

  <!-- Title text: Workplace Guard -->
  <text x="300" y="465" font-family="'Playfair Display','Georgia',serif" font-size="22" fill="#1A1A1A" text-anchor="middle" font-weight="bold" letter-spacing="2">Workplace Guard</text>

  <!-- Chinese subtitle -->
  <text x="300" y="498" font-family="'STKaiti','KaiTi','Noto Serif SC',serif" font-size="18" fill="url(#cinnabar)" text-anchor="middle" letter-spacing="2">职场护身符 · 事业平安</text>

  <!-- English description -->
  <text x="300" y="530" font-family="'Helvetica','Arial',sans-serif" font-size="13" fill="#666" text-anchor="middle" letter-spacing="1">Protect your professional energy</text>

  <!-- Decorative bottom line -->
  <line x1="200" y1="560" x2="400" y2="560" stroke="#1A1A1A" stroke-width="0.5" opacity="0.25"/>

  <!-- Small cinnabar dot center bottom -->
  <circle cx="300" cy="570" r="3" fill="url(#cinnabar)" opacity="0.5"/>
</svg>