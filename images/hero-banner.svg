<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="30%" stop-color="#2D0A00"/>
      <stop offset="60%" stop-color="#1A0500"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </linearGradient>
    <linearGradient id="goldtext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFF8DC"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="redaccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- Decorative outer border -->
  <rect x="15" y="15" width="1170" height="470" rx="8" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
  <rect x="25" y="25" width="1150" height="450" rx="6" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.2"/>
  <!-- Corner ornaments -->
  <path d="M15,50 L15,15 L50,15" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
  <path d="M1185,50 L1185,15 L1150,15" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
  <path d="M15,450 L15,485 L50,485" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
  <path d="M1185,450 L1185,485 L1150,485" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
  <!-- Decorative top pattern -->
  <path d="M0,60 Q100,40 200,55 Q300,70 400,50 Q500,30 600,55 Q700,80 800,50 Q900,20 1000,55 Q1100,70 1200,50" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
  <path d="M0,440 Q100,460 200,445 Q300,430 400,450 Q500,470 600,445 Q700,420 800,450 Q900,480 1000,445 Q1100,430 1200,450" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
  <!-- Central seal -->
  <rect x="460" y="40" width="280" height="70" rx="6" fill="url(#redaccent)" opacity="0.85"/>
  <text x="600" y="85" font-family="'Playfair Display', serif" font-size="28" fill="#FFD700" text-anchor="middle" font-weight="bold" letter-spacing="4">✦ HERCLAUDE ✦</text>
  <!-- Main title -->
  <text x="600" y="190" font-family="'Playfair Display', serif" font-size="56" fill="url(#goldtext)" text-anchor="middle" font-weight="bold" filter="url(#glow)">Ancient Chinese Talismans</text>
  <text x="600" y="230" font-family="'Noto Serif SC', serif" font-size="24" fill="#CC0000" text-anchor="middle" letter-spacing="6">道家符箓 · 千年传承</text>
  <!-- Divider -->
  <line x1="350" y1="270" x2="850" y2="270" stroke="url(#goldtext)" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="270" r="4" fill="#FFD700"/>
  <!-- Subtitle -->
  <text x="600" y="310" font-family="sans-serif" font-size="20" fill="#DAA520" text-anchor="middle" letter-spacing="3" opacity="0.9">Authentic Blessings from the East</text>
  <text x="600" y="340" font-family="sans-serif" font-size="14" fill="#A08050" text-anchor="middle" letter-spacing="2">Hand-crafted Daoist talismans · 招财 · 护身 · 姻缘 · 平安</text>
  <!-- Bottom decoration -->
  <path d="M200,400 Q250,380 300,395 Q350,410 400,390 Q450,370 500,395 Q550,420 600,390 Q650,360 700,395 Q750,430 800,390 Q850,350 900,395 Q950,440 1000,390" fill="none" stroke="#DAA520" stroke-width="1.5" opacity="0.4"/>
</svg>
